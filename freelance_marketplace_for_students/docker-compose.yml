
services:
  db:
    image: mysql:8.0
    container_name: freelance_db
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-1111}
      MYSQL_DATABASE: ${DB_NAME:-freelance_marketplace}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
    networks:
      - freelance_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-1111}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freelance_backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT:-8080}
      DB_HOST: db
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-1111}
      DB_NAME: ${DB_NAME:-freelance_marketplace}
      KEY1: ${KEY1:-your-secret-key-1}
      KEY2: ${KEY2:-your-secret-key-2}
      SECRET: ${SECRET:-your-secret-session-key}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5174,http://127.0.0.1:5174}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app        
      - ./config:/app/config   
      - /app/node_modules       
    networks:
      - freelance_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: freelance_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5174}:5174"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - freelance_network

networks:
  freelance_network:
    driver: bridge

volumes:
  mysql_data:

